name: Build Notes Sync app

on:
  push:
    branches: [claude/notes-app-sync-r238wh]
    paths:
      - 'app/**'
      - '.github/workflows/build-app.yml'
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Generate Android platform folder
        run: flutter create . --platforms=android --org com.example
      - name: Add required Android manifest permissions
        run: python3 ../.github/scripts/patch_android_manifest.py android/app/src/main/AndroidManifest.xml
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: notes-sync-android
          path: app/build/app/outputs/flutter-apk/app-release.apk

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Generate Windows platform folder
        run: flutter create . --platforms=windows --org com.example
      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows --release
      - name: Zip build output
        shell: pwsh
        run: |
          $releaseDir = Get-ChildItem -Path build\windows -Recurse -Directory -Filter Release | Select-Object -First 1
          Compress-Archive -Path (Join-Path $releaseDir.FullName '*') -DestinationPath notes-sync-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: notes-sync-windows
          path: app/notes-sync-windows.zip
