name: Build Notes Sync app

on:
  push:
    branches: [claude/notes-app-sync-r238wh]
    paths:
      - 'app/**'
      - '.github/workflows/build-app.yml'
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Generate Android platform folder
        run: flutter create . --platforms=android --org com.example
      - name: Add required Android manifest permissions
        run: python3 ../.github/scripts/patch_android_manifest.py android/app/src/main/AndroidManifest.xml
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: notes-sync-android
          path: app/build/app/outputs/flutter-apk/app-release.apk

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Generate Windows platform folder
        run: flutter create . --platforms=windows --org com.example
      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows --release
      - name: Zip build output
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $candidates = @(
            'build\windows\x64\runner\Release',
            'build\windows\runner\Release',
            'build\windows\arm64\runner\Release'
          )
          $releasePath = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $releasePath) {
            Write-Host "Release folder not found in any of: $candidates"
            Write-Host "Full contents of build\windows:"
            Get-ChildItem -Path build\windows -Recurse | ForEach-Object { Write-Host $_.FullName }
            throw "Could not locate the Windows release build output"
          }
          Write-Host "Using release path: $releasePath"
          Compress-Archive -Path (Join-Path $releasePath '*') -DestinationPath notes-sync-windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: notes-sync-windows
          path: app/notes-sync-windows.zip
