name: notes_sync
description: Cross-platform notes app that syncs between paired devices without an account or email.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local persistence (no code generation required)
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Networking
  http: ^1.2.1
  web_socket_channel: ^2.4.5

  # Crypto (pure-Dart AES-GCM + HMAC/SHA-256, no native bindings needed)
  cryptography: ^2.7.0

  # Pairing UI
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
